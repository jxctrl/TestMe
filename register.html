<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>QuizArena - Register</title>
  <link rel="icon" href="./favicon/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/quiz.css">
  <link rel="stylesheet" href="./css/account.css">
  <script src="./js/lang.js"></script>
  <script src="./js/mobile.js"></script>
</head>
<body>
  <header class="quiz-header">
    <a href="index.html" class="nav-logo">Quiz<span>Arena</span></a>
    <div class="header-right">
      <a href="index.html" class="back-btn" data-i18n="backHome">Back to Home</a>
    </div>
  </header>

  <main class="account-main">
    <section class="account-card">
      <div class="account-kicker" data-i18n="navRegister">Register</div>
      <h1 data-i18n="registerTitle">Create your account.</h1>
      <p class="account-copy" data-i18n="registerDesc">Register once, then keep your quiz history, best scores, and competition results in one place.</p>

      <form id="authForm" class="account-form" data-auth-page="register">
        <label for="username" data-i18n="authUsernameLabel">Username</label>
        <input id="username" name="username" type="text" required minlength="3" maxlength="50" placeholder="CodeNomad" autocomplete="username">

        <label for="email" data-i18n="authEmailLabel">Email</label>
        <input id="email" name="email" type="email" required placeholder="you@example.com" autocomplete="email">

        <label for="password" data-i18n="authPasswordLabel">Password</label>
        <input id="password" name="password" type="password" required minlength="8" placeholder="At least 8 characters" autocomplete="new-password">

        <div class="form-message" id="authMessage"></div>
        <button type="submit" class="form-submit" data-i18n="registerSubmit">Create Account</button>
      </form>

      <div class="social-auth">
        <div class="social-auth-divider" data-i18n="authOr">or</div>
        <div id="googleButtonContainer"></div>
      </div>

      <p class="account-switch">
        <span data-i18n="registerSwitchText">Already have an account?</span>
        <a href="login.html" data-i18n="registerSwitchLink">Log in</a>
      </p>
    </section>
  </main>

  <script src="./js/api.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/auth-pages.js"></script>
</body>
</html>
