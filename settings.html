<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizArena - Settings</title>
  <link rel="icon" href="./favicon/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/quiz.css">
  <link rel="stylesheet" href="./css/account.css">
  <script src="./js/lang.js"></script>
</head>
<body>
  <header class="quiz-header">
    <a href="index.html" class="nav-logo">Quiz<span>Arena</span></a>
    <div class="header-right">
      <div class="header-user-actions" id="headerUserActions"></div>
      <button id="langBtn" onclick="toggleLanguage()" class="lang-btn">🇺🇿 O'Z</button>
      <a href="profile.html" class="back-btn" data-i18n="settingsBackToProfile">← Back</a>
    </div>
  </header>

  <main class="dashboard-main dashboard-theme settings-main">
    <section class="settings-grid">
      <article class="dashboard-card settings-preview-card">
        <div class="section-subtitle" data-i18n="settingsAvatarLabel">Profile picture</div>
        <div class="settings-preview-stack">
          <div class="profile-avatar settings-avatar" id="settingsAvatar" aria-hidden="true">
            <img id="settingsAvatarImage" class="profile-avatar-img" alt="" />
            <span id="settingsAvatarInitial">?</span>
          </div>
          <div class="settings-preview-copy">
            <h1 id="settingsPreviewUsername">...</h1>
            <p class="account-copy" data-i18n="settingsChangeAvatarHint"></p>
            <div class="settings-selected-file" id="settingsSelectedFile" aria-live="polite"></div>
          </div>
        </div>
      </article>

      <article class="dashboard-card settings-form-card">
        <div class="settings-card-head">
          <div class="section-subtitle" data-i18n="settingsTitle">Account Settings</div>
          <p class="dashboard-panel-copy" data-i18n="settingsChangeAvatarHint"></p>
        </div>
        <form id="settingsForm" class="account-form stacked-form settings-form">
          <label for="settingsUsername" data-i18n="settingsUsernameLabel">Username</label>
          <input id="settingsUsername" name="username" type="text" required minlength="3" maxlength="50" />

          <label for="settingsAvatarInput" data-i18n="settingsAvatarLabel">Profile picture</label>
          <input id="settingsAvatarInput" name="avatar" type="file" accept="image/png,image/jpeg,image/webp,image/gif" />

          <div class="form-message" id="settingsMessage"></div>

          <div class="settings-actions">
            <button type="submit" class="form-submit" data-i18n="settingsSaveButton">Save changes</button>
            <a href="profile.html" class="result-btn secondary" data-i18n="settingsBackToProfile">Back to Profile</a>
          </div>
        </form>
      </article>
    </section>
  </main>

  <script src="./js/api.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/settings.js"></script>
</body>
</html>
